<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Tracker 2026 — Native Teams</title>
<style>
:root{--pink:#FF2D55;--border:#E5E7EB;--border-s:#D1D5DB;--s:#fff;--s2:#F9FAFB;--s3:#F3F4F6;--text:#111827;--muted:#6B7280;--light:#9CA3AF;--r:8px;--rl:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#F3F4F6;color:var(--text);min-height:100vh}
.topbar{background:var(--pink);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:10px;color:#fff;font-size:15px;font-weight:500}
.brand img{height:34px;width:34px;border-radius:8px}
.brand-sep{width:1px;height:20px;background:rgba(255,255,255,.3);margin:0 4px}
.brand-sub{font-size:12px;color:rgba(255,255,255,.55)}
.sync-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:var(--r);padding:6px 14px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px}
.sync-btn:hover{background:rgba(255,255,255,.25)}
.sync-btn.spinning svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.main{max-width:1300px;margin:0 auto;padding:20px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.stat{background:var(--s);border-radius:var(--rl);padding:14px 16px;border:1px solid var(--border)}
.slabel{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.sval{font-size:24px;font-weight:500;line-height:1}
.alert-bar{border-radius:var(--rl);padding:12px 16px;margin-bottom:10px;border-left:4px solid transparent;cursor:pointer;user-select:none}
.alert-bar.crit{background:#FEF2F2;border-left-color:var(--pink)}
.alert-bar.warn{background:#FFF5F7;border-left-color:var(--pink)}
.alert-bar.clear{background:#F0FDF4;border-left-color:#22C55E}
.ab-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.ab-title{font-size:12px;font-weight:500}
.alert-bar.crit .ab-title,.alert-bar.warn .ab-title{color:#BE1942}
.alert-bar.clear .ab-title{color:#166534}
.ab-preview{font-size:11px;color:var(--muted);margin-top:3px}
.ab-arrow{font-size:11px;color:#BE1942;transition:transform .2s;flex-shrink:0}
.alert-bar.clear .ab-arrow{color:#166534}
.ab-body{display:none;margin-top:8px;border-top:1px solid rgba(0,0,0,.06);padding-top:8px}
.ab-item{font-size:11px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.05);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ab-item:last-child{border-bottom:none}
.ab-date{font-weight:500;color:var(--text);min-width:155px}
.ab-pct{font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px;background:#FFE4EA;color:#BE1942;white-space:nowrap}
.ab-pct.hi{background:#FCEBEB;color:#991B1B}
.ab-note{font-size:11px;color:var(--muted)}
.card{background:var(--s);border-radius:var(--rl);border:1px solid var(--border);margin-bottom:16px;overflow:hidden}
.card-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.card-title{font-size:13px;font-weight:500}
.controls-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.view-toggle{display:flex;border:1px solid var(--border-s);border-radius:var(--r);overflow:hidden}
.vt{background:none;border:none;padding:5px 13px;cursor:pointer;font-size:12px;color:var(--muted)}
.vt.on{background:var(--pink);color:#fff;font-weight:500}
.nbtn{background:none;border:1px solid var(--border-s);border-radius:var(--r);padding:5px 10px;cursor:pointer;font-size:13px;color:var(--text)}
.nbtn:hover{background:var(--s2)}
.mlabel{font-size:13px;font-weight:500;min-width:130px;text-align:center}
.showall-btn{background:none;border:1px solid var(--border-s);border-radius:var(--r);padding:5px 12px;cursor:pointer;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.showall-btn.on{background:var(--s2);color:var(--text);border-color:var(--border-s)}
.legend{display:flex;flex-wrap:wrap;gap:12px;padding:9px 16px;border-bottom:1px solid var(--border);background:var(--s2)}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.ldot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.twrap{overflow-x:auto;scrollbar-width:none}.twrap::-webkit-scrollbar{display:none}
table{border-collapse:collapse;width:100%;font-size:11px}
thead th{background:var(--s2);font-weight:500;font-size:9px;color:var(--muted);padding:7px 2px;text-align:center;border-bottom:2px solid var(--border-s);white-space:nowrap;position:sticky;top:56px;z-index:5}
thead th.nc{text-align:left;padding-left:14px;position:sticky;left:0;z-index:10;background:var(--s2);border-right:2px solid var(--border-s)}
thead th.nc-dept{min-width:195px}
thead th.nc-emp{min-width:170px}
thead th.alert-h{background:#FFF0F2!important;color:#BE1942!important}
thead th.crit-h{background:#FCEBEB!important;color:#991B1B!important}
tbody td{border-bottom:1px solid var(--border);border-right:1px solid var(--border);height:28px;text-align:center;padding:0;width:24px;min-width:24px}
tbody td:last-child{border-right:none}
tbody tr:last-child td{border-bottom:none}
tbody td.nmc{text-align:left;padding:0 12px;font-weight:500;position:sticky;left:0;z-index:3;background:var(--s);white-space:nowrap;border-right:2px solid var(--border-s)}
tbody tr:nth-child(even) td.nmc{background:var(--s2)}
tbody tr:nth-child(even) td{background:var(--s2)}
td.wknd{background:#F9FAFB!important}
td.sum{background:var(--s3)!important;font-size:10px;font-weight:500;width:34px;min-width:34px;text-align:center}
.dcell{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;cursor:pointer}
.dcell:hover{filter:brightness(.93)}
.pip{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600}
.dept-row td.nmc{cursor:pointer;font-size:12px}
.dept-row td.nmc:hover{color:var(--pink)}
.dept-chevron{transition:transform .2s;color:var(--light)}
.drill-panel{border-top:1px solid var(--border)}
.drill-hdr{padding:9px 16px;background:#FFF5F7;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:500;color:#BE1942;border-bottom:1px solid #FFD6DE}
.drill-close{background:none;border:none;cursor:pointer;color:#BE1942;font-size:16px}
.err{background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--r);padding:12px 16px;font-size:13px;color:#991B1B;margin-bottom:12px}
.loading{text-align:center;padding:50px;color:var(--muted)}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
.ts{font-size:11px;color:var(--light);text-align:right;margin-top:8px}
.ann-grid{display:grid;grid-template-columns:180px repeat(12,1fr)}
.ann-grid>div{border-bottom:1px solid var(--border);border-right:1px solid var(--border);padding:8px 5px;font-size:10px;text-align:center}
.ann-grid>div:nth-child(13n){border-right:none}
.ann-grid>.ah{background:var(--s2);font-weight:500;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.ann-grid>.an{text-align:left;padding-left:14px;font-weight:500;background:var(--s);position:sticky;left:0;border-right:1px solid var(--border-s);cursor:pointer}
.ann-grid>.an:hover{color:var(--pink)}
.ann-grid>.ah.an{background:var(--s2)}
.ann-grid>.cm{outline:2px solid var(--pink);outline-offset:-2px}
@media(max-width:768px){.main{padding:12px}.topbar{padding:0 12px}}
</style>
</head>

function classify(s){const l=s.toLowerCase();if(l.includes('sick'))return'sick';if(l.includes('parental')||l.includes('pregnancy')||l.includes('maternity'))return'parental';if(l.includes('public holiday'))return'ph';if(l.includes('bday')||l.includes('birthday'))return'bday';if(l.includes('day off')||l.includes('days off')||l.includes('holiday'))return'dayoff';return'other';}
function priType(t){return{sick:0,parental:1,dayoff:2,ph:3,swap_work:3,swap_taken:3,bday:4,other:5}[t]??9;}
function setEvt(k,t,s){if(!evtMap[k]||priType(t)<priType(evtMap[k].type))evtMap[k]={type:t,summary:s};}
function expandDates(sd,ed,fn){let d=new Date(sd.slice(0,10)+'T00:00:00');const end=new Date(ed.slice(0,10)+'T00:00:00');while(d<end){fn(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);}}
function getPHCountries(summary){const l=summary.toLowerCase();if(!l.includes('public holiday'))return[];const res=[];for(const[c,keys]of Object.entries(COUNTRY_PH)){if(keys.some(k=>l.includes(k)))res.push(c);}return res;}
function findPersonByName(summary){const s=summary.toLowerCase();for(const[dept,people]of Object.entries(DEPT_MAP)){for(const p of people){if(!p.email)continue;const pts=p.name.toLowerCase().split(' ');if(pts.every(x=>s.includes(x.slice(0,5)))||s.includes(pts[0])&&s.includes(pts[pts.length-1].slice(0,5)))return{...p,dept};}}return null;}
function findPersonByEmail(email){const l=email.toLowerCase().trim();for(const[dept,people]of Object.entries(DEPT_MAP)){for(const p of people){if(p.email&&p.email.toLowerCase()===l)return{...p,dept};}}return null;}

function buildEventMap(items){
  evtMap={};
  for(const e of items){
    const sum=e.summary||'';
    const sd=e.start?.date||e.start?.dateTime;
    const ed=e.end?.date||e.end?.dateTime;
    if(!sd||!ed)continue;
    const phC=getPHCountries(sum);
    if(phC.length>0){
      for(const[dept,people]of Object.entries(DEPT_MAP))for(const p of people)if(phC.includes(p.country)&&p.email)expandDates(sd,ed,ds=>setEvt(p.email+'|'+ds,'ph',sum));
      continue;
    }
    const person=findPersonByName(sum);
    if(!person||!person.email)continue;
    expandDates(sd,ed,ds=>setEvt(person.email+'|'+ds,classify(sum),sum));
  }
}

function buildSwapMap(tasks){
  swapMap={};
  for(const t of tasks){
    const notes=t.notes||'';
    if(!notes.includes('Public Holiday Swap'))continue;
    const em=notes.match(/email[^\n:]*:\s*\n?([^\n]+)/i);
    if(!em)continue;
    const email=em[1].trim();
    const person=findPersonByEmail(email);
    if(!person||!person.email)continue;
    const sm=notes.match(/swap date[^\n:]*:\s*\n([^\n]+)/i);
    if(!sm)continue;
    let swapDate=null;
    try{const d=new Date(sm[1].trim());if(!isNaN(d))swapDate=d.toISOString().slice(0,10);}catch(e){}
    if(!swapDate)continue;
    if(!swapMap[person.email])swapMap[person.email]=[];
    swapMap[person.email].push({swapDate});
    setEvt(person.email+'|'+swapDate,'swap_taken','Swap day — '+person.name);
  }
}

function getDeptAbsent(dept,ds){
  const people=(DEPT_MAP[dept]||[]).filter(p=>p.email);
  const absent=people.filter(p=>{const ev=evtMap[p.email+'|'+ds];return ev&&ev.type!=='bday'&&ev.type!=='swap_work';});
  return{absent:absent.length,total:people.length,pct:people.length?Math.round(absent.length/people.length*100):0};
}

async function fetchCalendar(){
  const base=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events`;
  let all=[],tok=null;
  do{
    const p=new URLSearchParams({key:API_KEY,timeMin:'2026-01-01T00:00:00Z',timeMax:'2026-12-31T23:59:59Z',maxResults:'250',singleEvents:'true',orderBy:'startTime'});
    if(tok)p.set('pageToken',tok);
    const r=await fetch(`${base}?${p}`);
    if(!r.ok)throw new Error('Calendar API '+r.status);
    const d=await r.json();
    all=all.concat(d.items||[]);
    tok=d.nextPageToken||null;
  }while(tok);
  return all;
}

async function fetchAsanaSwaps(){
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:6000,mcp_servers:[{type:'url',url:'https://mcp.asana.com/sse',name:'asana'}],messages:[{role:'user',content:'Get all tasks from Asana project ID 1204904445695308 including completed ones. Return ONLY a raw JSON array, no markdown, no fences: [{"name":"...","notes":"..."}]'}]})});
    const d=await r.json();
    const text=d.content?.filter(b=>b.type==='text').map(b=>b.text).join('');
    return JSON.parse(text.replace(/```json|```/g,'').trim());
  }catch(e){console.warn('Asana unavailable:',e);return[];}
}

    renderAll();
  }catch(e){
    document.getElementById('load-area').style.display='none';
    document.getElementById('content').style.display='block';
    document.getElementById('err-area').innerHTML=`<div class="err">Error: ${e.message}</div>`;
    evtMap={};renderAll();
  }finally{btn.classList.remove('spinning');}
}

function renderAll(){renderStats();renderBanners();curView==='dept'?renderDept():renderAnnual();}

function renderStats(){
  const now=new Date();
  const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const nm=now.getMonth(),ny=now.getFullYear(),d=dim(ny,nm);
  let alerts=0;const seen=new Set();
  for(let day=1;day<=d;day++){
    const ds=`${ny}-${String(nm+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dd=new Date(ds+'T00:00:00');
    if(dd.getDay()===0||dd.getDay()===6)continue;
    for(const dept of DEPT_ORDER){const{pct}=getDeptAbsent(dept,ds);if(pct>=30){const k=dept+'|'+ds;if(!seen.has(k)){seen.add(k);alerts++;}}}
  }
  let swapCount=0;for(const s of Object.values(swapMap))swapCount+=s.length;
  let offToday=0;
  for(const[,people]of Object.entries(DEPT_MAP))for(const p of people){if(!p.email)continue;const ev=evtMap[p.email+'|'+todayStr];if(ev&&ev.type!=='bday'&&ev.type!=='swap_work')offToday++;}
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="slabel">Off today</div><div class="sval" style="color:var(--pink)">${offToday}</div></div>
    <div class="stat"><div class="slabel">Dept alerts this month</div><div class="sval" style="color:#D97706">${alerts}</div></div>
    <div class="stat"><div class="slabel">Holiday swaps active</div><div class="sval" style="color:#059669">${swapCount}</div></div>
    <div class="stat"><div class="slabel">Active employees</div><div class="sval">336</div></div>`;
}

function renderBanners(){
  const now=new Date();
  const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const alerts=[];
  for(let mi=0;mi<12;mi++){const d=dim(2026,mi);for(let day=1;day<=d;day++){
    const ds=`2026-${String(mi+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    if(ds<todayStr)continue;
    const dd=new Date(ds+'T00:00:00');if(dd.getDay()===0||dd.getDay()===6)continue;
    for(const dept of DEPT_ORDER){const{absent,total,pct}=getDeptAbsent(dept,ds);if(pct>=30)alerts.push({ds,dept,absent,total,pct,level:pct>=50?'crit':'warn'});}
  }}
  alerts.sort((a,b)=>a.ds.localeCompare(b.ds));
  const crit=alerts.filter(a=>a.level==='crit'),warn=alerts.filter(a=>a.level==='warn');
  let html='';
  const grp=(items,isCrit)=>{
    if(!items.length)return'';
    const prev=items.slice(0,3).map(a=>{const dd=new Date(a.ds+'T00:00:00');return`${a.dept.split(' ')[0]} ${dd.toLocaleDateString('en-GB',{day:'numeric',month:'short'})} (${a.pct}%)`;}).join(' · ')+(items.length>3?` +${items.length-3} more`:'');
    const title=isCrit?`Critical — ${items.length} upcoming day${items.length!==1?'s':''} with 50%+ of a department absent`:`Watch — ${items.length} upcoming day${items.length!==1?'s':''} with 30–49% of a department absent`;
    let s=`<div class="alert-bar ${isCrit?'crit':'warn'}" onclick="var b=this.querySelector('.ab-body');b.style.display=b.style.display==='block'?'none':'block';this.querySelector('.ab-arrow').style.transform=b.style.display==='block'?'rotate(180deg)':'rotate(0)'">
      <div class="ab-head"><div><div class="ab-title">${isCrit?'&#9888;':'&#9651;'} ${title}</div><div class="ab-preview">${prev}</div></div><span class="ab-arrow">&#9660;</span></div>
      <div class="ab-body">`;
    for(const a of items){const dd=new Date(a.ds+'T00:00:00');const fmt=dd.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});const mgr=DEPT_MGR[a.dept]||'dept lead';
      s+=`<div class="ab-item"><span class="ab-date">${fmt}</span><span class="ab-pct${isCrit?' hi':''}">${a.dept} — ${a.absent}/${a.total} · ${a.pct}% absent</span><span class="ab-note">Check in with ${mgr}</span></div>`;}
    return s+'</div></div>';};
  html+=grp(crit,true)+grp(warn,false);
  if(!crit.length&&!warn.length)html=`<div class="alert-bar clear"><div class="ab-head"><div class="ab-title">&#10003; No upcoming days where 30%+ of any department is absent — all clear</div><span class="ab-arrow" style="color:#166634">&#9660;</span></div></div>`;
  document.getElementById('banners').innerHTML=html;
}

function setView(v){curView=v;document.querySelectorAll('.vt').forEach((b,i)=>b.classList.toggle('on',['dept','annual'][i]===v));document.getElementById('pane-dept').style.display=v==='dept'?'block':'none';document.getElementById('pane-annual').style.display=v==='annual'?'block':'none';v==='annual'?renderAnnual():renderDept();}
function changeMonth(d){curM+=d;if(curM>11){curM=0;curY++;}if(curM<0){curM=11;curY--;}openDrill=null;renderDept();}
function toggleShowAll(){showAll=!showAll;document.getElementById('showall-btn').classList.toggle('on',showAll);renderDept();}
function toggleDrill(dept){openDrill=openDrill===dept?null:dept;renderDept();}

function renderDept(){
  document.getElementById('mlabel').textContent=MONTHS[curM]+' '+curY;
  const days=dim(curY,curM);
  // Column-level alert
  const colLvl={};
  for(let d=1;d<=days;d++){
    const ds=`${curY}-${String(curM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dd=new Date(ds+'T00:00:00');if(dd.getDay()===0||dd.getDay()===6)continue;
    let mx=0;for(const dept of DEPT_ORDER){const{pct}=getDeptAbsent(dept,ds);if(pct>mx)mx=pct;}
    colLvl[ds]=mx>=50?'crit':mx>=30?'alert':'';
  }
  let html='<table><thead><tr><th class="nc nc-dept">Department</th>';
  for(let d=1;d<=days;d++){
    const ds=`${curY}-${String(curM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dd=new Date(ds+'T00:00:00');const wk=dd.getDay();const isW=wk===0||wk===6;
    const cl=colLvl[ds];
    html+=`<th class="${cl==='crit'?'crit-h':cl==='alert'?'alert-h':''}" style="${isW?'color:#9CA3AF':''}">${d}<br><span style="font-size:7px;font-weight:400">${DAYS[wk]}</span></th>`;
  }
  html+='<th class="sum">Avg</th></tr></thead><tbody>';

  for(const dept of DEPT_ORDER){
    if(!DEPT_MAP[dept])continue;
    const eligible=DEPT_MAP[dept].filter(p=>p.email);
    if(!eligible.length)continue;
    let totPct=0,wkd=0;
    for(let d=1;d<=days;d++){
      const ds=`${curY}-${String(curM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dd=new Date(ds+'T00:00:00');if(dd.getDay()===0||dd.getDay()===6)continue;
      totPct+=getDeptAbsent(dept,ds).pct;wkd++;
    }
    const avg=wkd?Math.round(totPct/wkd):0;
    const isOpen=openDrill===dept;
    html+=`<tr class="dept-row"><td class="nmc" onclick="toggleDrill('${dept}')"><div style="display:flex;align-items:center;justify-content:space-between;padding-right:4px"><span>${dept} <span style="font-size:9px;font-weight:400;color:var(--muted)">${eligible.length}</span></span><svg class="dept-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transform:rotate(${isOpen?90:0}deg)"><path d="M9 18l6-6-6-6"/></svg></div></td>`;
    for(let d=1;d<=days;d++){
      const ds=`${curY}-${String(curM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dd=new Date(ds+'T00:00:00');const isW=dd.getDay()===0||dd.getDay()===6;
      const{absent,total,pct}=getDeptAbsent(dept,ds);
      const st=getCellStyle(pct,isW);
      html+=`<td style="background:${st.bg};${st.border}" onclick="${!isW&&absent>0?`toggleDrill('${dept}')`:''}" title="${!isW&&absent>0?`${dept}: ${absent}/${total} absent (${pct}%)`:''}">`;
      if(!isW&&absent>0)html+=`<div class="dcell" style="color:${st.color}">${absent}</div>`;
      html+='</td>';
    }
    html+=`<td class="sum" style="color:${avg>=30?'#BE1942':avg>=15?'#1E40AF':''}">${avg>0?avg+'%':''}</td></tr>`;

    if(isOpen){
      html+=`<tr><td colspan="${days+2}" style="padding:0"><div class="drill-panel"><div class="drill-hdr">${dept} — ${eligible.length} employees<button class="drill-close" onclick="openDrill=null;renderDept()">&#10005;</button></div><div class="twrap"><table style="font-size:10px"><thead><tr><th class="nc nc-emp" style="background:#FFF5F7;top:0">Employee</th>`;
      for(let d=1;d<=days;d++){
        const ds=`${curY}-${String(curM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dd=new Date(ds+'T00:00:00');const wk=dd.getDay();const isW=wk===0||wk===6;
        const cl=colLvl[ds];
        html+=`<th class="${cl==='crit'?'crit-h':cl==='alert'?'alert-h':''}" style="${isW?'color:#9CA3AF':''}; min-width:20px; width:20px; top:56px">${d}</th>`;
      }
      html+='<th class="sum" style="top:0">DO</th><th class="sum" style="top:0">PH</th><th class="sum" style="top:0">PS</th></tr></thead><tbody>';
      for(const person of eligible){
        html+=`<tr><td class="nmc" style="font-size:10px;background:#FFF5F7">${person.name}</td>`;
        let cDO=0,cPH=0,cPS=0;
        for(let d=1;d<=days;d++){
          const ds=`${curY}-${String(curM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const dd=new Date(ds+'T00:00:00');const isW=dd.getDay()===0||dd.getDay()===6;
          const ev=evtMap[person.email+'|'+ds];
          let bg=isW?'#F9FAFB':'transparent';let inner='';
          if(ev){const p2=pip(ev.type);bg=p2.bg;inner=`<div class="pip" style="background:${p2.bg};color:${p2.c}">${p2.l}</div>`;if(ev.type==='dayoff')cDO++;else if(ev.type==='ph')cPH++;else if(ev.type==='swap_taken')cPS++;}
          html+=`<td style="background:${bg}" title="${ev?ev.summary:''}">${inner}</td>`;
        }
        html+=`<td class="sum">${cDO||''}</td><td class="sum">${cPH||''}</td><td class="sum">${cPS||''}</td></tr>`;
      }
      html+='</tbody></table></div></div></td></tr>';
    }
  }

  if(showAll&&!openDrill){
    html+=`<tr><td colspan="${days+2}" style="padding:8px 14px;background:#F3F4F6;font-size:10px;color:var(--muted);font-style:italic;border-top:2px solid var(--border)">All 336 active employees</td></tr>`;
    for(const dept of DEPT_ORDER){
      const people=(DEPT_MAP[dept]||[]).filter(p=>p.email);
      for(const person of people){
        html+=`<tr><td class="nmc" style="font-size:10px;font-weight:400"><span style="font-size:9px;color:var(--light);margin-right:3px">${dept.split(' ')[0]}</span>${person.name}</td>`;
        let cDO=0;
        for(let d=1;d<=days;d++){
          const ds=`${curY}-${String(curM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const dd=new Date(ds+'T00:00:00');const isW=dd.getDay()===0||dd.getDay()===6;
          const ev=evtMap[person.email+'|'+ds];
          let bg=isW?'#F9FAFB':'transparent';let inner='';
          if(ev){const p2=pip(ev.type);bg=p2.bg;inner=`<div class="pip" style="background:${p2.bg};color:${p2.c}">${p2.l}</div>`;if(ev.type==='dayoff')cDO++;}
          html+=`<td style="background:${bg}">${inner}</td>`;
        }
        html+=`<td class="sum">${cDO||''}</td><td class="sum"></td><td class="sum"></td></tr>`;
      }
    }
  }
  html+='</tbody></table>';
  document.getElementById('pane-dept').innerHTML=html;
}

function renderAnnual(){
  const curMI=new Date().getMonth();
  let html='<div class="ann-grid"><div class="ah an">Department</div>';
  for(const m of MS)html+=`<div class="ah">${m}</div>`;
  for(const dept of DEPT_ORDER){
    if(!DEPT_MAP[dept])continue;
    const eligible=DEPT_MAP[dept].filter(p=>p.email);
    if(!eligible.length)continue;
    html+=`<div class="an" onclick="curM=new Date().getMonth();openDrill='${dept}';setView('dept')">${dept} <span style="font-size:9px;font-weight:400;color:var(--muted)">${eligible.length}</span></div>`;
    for(let mi=0;mi<12;mi++){
      const d=dim(2026,mi);let totPct=0,wkd=0,mx=0;
      for(let day=1;day<=d;day++){
        const ds=`2026-${String(mi+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const dd=new Date(ds+'T00:00:00');if(dd.getDay()===0||dd.getDay()===6)continue;
        const{pct}=getDeptAbsent(dept,ds);totPct+=pct;wkd++;if(pct>mx)mx=pct;
      }
      const avg=wkd?Math.round(totPct/wkd):0;
      const isCm=mi===curMI;
      let bg='transparent',color='var(--muted)';
      if(mx>=50){bg='#FCEBEB';color='#991B1B';}
      else if(mx>=30){bg='#FFF0F2';color='#BE1942';}
      else if(avg>0){bg='#DBEAFE';color='#1E40AF';}
      html+=`<div class="${isCm?'cm':''}" style="background:${bg};color:${color};font-weight:500;cursor:pointer" onclick="curM=${mi};curY=2026;openDrill='${dept}';setView('dept')">${avg>0?avg+'%':''}</div>`;
    }
  }
  html+='</div>';
  document.getElementById('pane-annual').innerHTML=html;
}

doRefresh();
</script>
